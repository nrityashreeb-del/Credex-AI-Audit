<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credex AI Spend Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>AI Spend Auditor</h1>
            <p>Identify cost-leakage and optimize your team's AI subscriptions.</p>
        </header>

        <section id="audit-tool">
            <div class="input-group">
                <div class="field">
                    <label for="teamSize">Total Team Size</label>
                    <input type="number" id="teamSize" placeholder="e.g. 12" min="1">
                </div>
                
                <div class="field">
                    <label for="totalSpend">Monthly AI Spend ($)</label>
                    <input type="number" id="totalSpend" placeholder="e.g. 400" min="0">
                </div>
                
                <button onclick="runAudit()">Analyze Enterprise Spend</button>
            </div>

            <div id="results" class="hidden">
                <div class="report-card">
                    <h3>Audit Summary</h3>
                    <p id="savingsText"></p>
                    
                    <div id="cta-box">
                        <p>Your data indicates high optimization potential.</p>
                        <button class="cta" onclick="window.location.href='mailto:contact@credex.rocks'">
                            Book Free Optimization
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
